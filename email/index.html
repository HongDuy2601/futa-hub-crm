<!-- ============================ TEMPLATES ============================ -->

<template id="tpl-compose">
  <section class="hero">
    <h1>Gửi email cá nhân hóa hàng loạt</h1>
    <p>Soạn 1 lần — gửi cho nhiều khách hàng, mỗi email tự động điền tên, dự án, thông tin riêng từ dữ liệu của bạn.</p>
  </section>

  <div class="compose-grid">
    <!-- LEFT: setup -->
    <section class="card">
      <div class="card-header">
        <h2>① Người nhận</h2>
        <a class="btn btn-ghost btn-sm" href="#/recipients">Quản lý danh sách →</a>
      </div>
      <div class="card-body">
        <div class="recipient-summary" id="recipientSummary">
          <p class="muted">Chưa có người nhận. <a href="#/recipients">Thêm ngay →</a></p>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>② Mẫu email</h2>
        <div class="header-actions">
          <select id="templatePicker" class="select-inline">
            <option value="">— Email mới —</option>
          </select>
          <button class="btn btn-ghost btn-sm" id="saveTemplateBtn">💾 Lưu mẫu</button>
        </div>
      </div>
      <div class="card-body">
        <label class="field-label">Tiêu đề</label>
        <input type="text" id="subjectInput" class="input" placeholder="Vd: Chào {{ten}}, dự án {{du_an}} có ưu đãi mới...">

        <div class="field-row">
          <label class="field-label">Nội dung email (hỗ trợ HTML & biến)</label>
          <div class="placeholder-hints" id="placeholderHints"></div>
        </div>
        <textarea id="bodyInput" class="textarea" rows="14" placeholder="Kính gửi anh/chị {{ten}},&#10;&#10;FUTA Land xin gửi thông tin dự án {{du_an}} mà anh/chị đã quan tâm..."></textarea>

        <div class="hint">
          💡 Dùng <code>{{ten_bien}}</code> để chèn dữ liệu cá nhân hóa. Click vào chip biến phía trên để chèn nhanh.
        </div>
      </div>
    </section>

    <!-- RIGHT: preview & send -->
    <aside class="card sticky-card">
      <div class="card-header">
        <h2>③ Xem trước & Gửi</h2>
      </div>
      <div class="card-body">
        <label class="field-label">Xem trước cho:</label>
        <select id="previewPicker" class="input"></select>

        <div class="preview-box">
          <div class="preview-meta">
            <div><span class="muted">Đến:</span> <strong id="prevTo">—</strong></div>
            <div><span class="muted">Tiêu đề:</span> <strong id="prevSubject">—</strong></div>
          </div>
          <div class="preview-body" id="prevBody"></div>
        </div>

        <div class="send-actions">
          <button class="btn btn-primary btn-block" id="sendBtn">
            ✉ Gửi cho <span id="sendCount">0</span> người
          </button>
          <button class="btn btn-ghost btn-block btn-sm" id="testSendBtn">
            🧪 Gửi thử cho chính tôi
          </button>
        </div>

        <div id="sendStatus" class="send-status" hidden></div>
      </div>
    </aside>
  </div>
</template>

<template id="tpl-recipients">
  <nav class="crumbs">
    <a href="#/">Trang chủ</a> <span>›</span> <strong>Người nhận</strong>
  </nav>

  <section class="card">
    <div class="card-header">
      <h2>Danh sách người nhận</h2>
      <div class="header-actions">
        <label class="btn btn-secondary" for="csvUpload">📂 Import CSV/Excel</label>
        <input type="file" id="csvUpload" accept=".csv,.xlsx,.xls" hidden>
        <button class="btn btn-secondary" id="addManualBtn">+ Thêm tay</button>
        <button class="btn btn-secondary" id="syncCrmBtn">🔄 Đồng bộ CRM</button>
        <button class="btn btn-ghost btn-sm" id="clearAllBtn">🗑 Xóa hết</button>
      </div>
    </div>
    <div class="card-body">
      <div class="recipients-toolbar">
        <input type="text" id="searchRecipients" class="input" placeholder="🔍 Tìm theo tên, email, dự án...">
        <span class="muted" id="recipientStats">0 người</span>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="recipientsTable">
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll" checked></th>
              <th>Email</th>
              <th>Tên</th>
              <th>Dự án quan tâm</th>
              <th>SĐT</th>
              <th>Trường bổ sung</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="recipientsBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="recipientsEmpty">
        <div class="empty-icon">📭</div>
        <h3>Chưa có người nhận nào</h3>
        <p>Bắt đầu bằng cách import file CSV/Excel hoặc thêm thủ công.</p>
        <p class="muted">CSV mẫu cần có ít nhất cột <code>email</code>. Các cột khác (ten, du_an, sdt, ...) sẽ thành biến template.</p>
        <button class="btn btn-ghost btn-sm" id="downloadSampleBtn">⬇ Tải file mẫu CSV</button>
      </div>
    </div>
  </section>
</template>

<template id="tpl-templates">
  <nav class="crumbs">
    <a href="#/">Trang chủ</a> <span>›</span> <strong>Mẫu email đã lưu</strong>
  </nav>
  <section class="card">
    <div class="card-header">
      <h2>Mẫu email đã lưu</h2>
      <p class="muted">Tái sử dụng nội dung email cho các chiến dịch tương tự.</p>
    </div>
    <div class="card-body">
      <div class="template-grid" id="templatesGrid"></div>
    </div>
  </section>
</template>

<template id="tpl-history">
  <nav class="crumbs">
    <a href="#/">Trang chủ</a> <span>›</span> <strong>Lịch sử chiến dịch</strong>
  </nav>
  <section class="card">
    <div class="card-header">
      <h2>Lịch sử gửi email</h2>
    </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Tiêu đề</th>
              <th>Số lượng</th>

<template id="tpl-settings">
  <nav class="crumbs">
    <a href="#/">Trang chủ</a> <span>›</span> <strong>Cài đặt</strong>
  </nav>

  <section class="card">
    <div class="card-header"><h2>🔧 Kết nối Google Apps Script</h2></div>
    <div class="card-body">
      <p class="muted">App này gửi email qua Google Apps Script chạy dưới tài khoản Workspace @futaland.vn. Bạn cần deploy script và dán URL vào đây 1 lần duy nhất.</p>

      <label class="field-label">Apps Script Web App URL</label>
      <input type="url" id="scriptUrl" class="input" placeholder="https://script.google.com/macros/s/AKfy.../exec">

      <label class="field-label">Tên hiển thị người gửi</label>
      <input type="text" id="senderName" class="input" placeholder="Vd: Phạm Hồng Duy - FUTA Land">

      <label class="field-label">Email gửi thử (test)</label>
      <input type="email" id="testEmail" class="input" placeholder="duy.phamhong@futaland.vn">

      <label class="field-label">Độ trễ giữa các email (ms)</label>
      <input type="number" id="throttleMs" class="input" value="500" min="0" step="100">
      <div class="hint">Khuyến nghị 500-1000ms để tránh bị Gmail đánh dấu spam.</div>

      <div class="form-actions" style="margin-top:1rem;">
        <button class="btn btn-primary" id="saveSettingsBtn">💾 Lưu</button>
        <button class="btn btn-secondary" id="testConnectionBtn">🔌 Test kết nối</button>
        <a class="btn btn-ghost" href="#/deploy">📖 Hướng dẫn deploy</a>
      </div>
      <div id="connectionStatus" class="conn-status" hidden></div>
    </div>
  </section>

  <section class="card">
    <div class="card-header"><h2>🔗 Đồng bộ CRM Supabase (tùy chọn)</h2></div>
    <div class="card-body">
      <p class="muted">Nếu bạn đã setup CRM với Supabase, dán cấu hình tại đây để pull danh sách lead/customer.</p>
      <label class="field-label">Supabase URL</label>
      <input type="url" id="supabaseUrl" class="input" placeholder="https://xxxxx.supabase.co">
      <label class="field-label">Supabase Anon Key</label>
      <input type="text" id="supabaseKey" class="input" placeholder="eyJhbGciOiJ...">
      <label class="field-label">Bảng nguồn</label>
      <input type="text" id="supabaseTable" class="input" value="leads">
      <div class="form-actions" style="margin-top:1rem;">
        <button class="btn btn-primary" id="saveCrmBtn">💾 Lưu cấu hình CRM</button>
      </div>
    </div>
  </section>
</template>

<template id="tpl-deploy">
  <nav class="crumbs">
    <a href="#/">Trang chủ</a> <span>›</span> <strong>Hướng dẫn deploy Google Apps Script</strong>
  </nav>

  <section class="card guide-intro">
    <div class="card-body">
      <h1 class="guide-title">📖 Hướng dẫn deploy Google Apps Script</h1>
      <p class="guide-lead">App này gửi email qua <strong>Google Apps Script</strong> chạy dưới tài khoản Google Workspace của bạn (@futaland.vn). <strong>100% miễn phí</strong>, không cần server riêng, quota <strong>~1.500 email/ngày</strong>.</p>
      <div class="guide-flow">
        <div class="flow-box">📱<br><small>Trình duyệt (app này)</small></div>
        <div class="flow-arrow">→ POST →</div>
        <div class="flow-box">⚙️<br><small>Apps Script<br>@futaland.vn</small></div>
        <div class="flow-arrow">→ Gmail →</div>
        <div class="flow-box">📨<br><small>Khách hàng</small></div>
      </div>
    </div>
  </section>

  <section class="card guide-step">
    <div class="card-header"><h2><span class="step-num">1</span> Tạo project Apps Script</h2></div>
    <div class="card-body">
      <ol class="guide-list">
        <li>Mở <a href="https://script.google.com" target="_blank" rel="noopener">script.google.com</a> → bấm <strong>"+ New project"</strong>.</li>
        <li>Đặt tên project: <code>FUTA Email Sender</code> (góc trên trái).</li>
      </ol>
      <div class="callout callout-info">
        ⚠️ Đảm bảo bạn đang đăng nhập đúng tài khoản Google Workspace muốn gửi email từ đó (vd: <code>duy.phamhong@futaland.vn</code>), KHÔNG phải gmail cá nhân.
      </div>
    </div>
  </section>

  <section class="card guide-step">
    <div class="card-header">
      <h2><span class="step-num">2</span> Dán code vào editor</h2>
      <button class="btn btn-primary btn-sm" id="copyScriptBtn">📋 Copy code Apps Script</button>
    </div>
    <div class="card-body">
      <ol class="guide-list">
        <li>Xóa toàn bộ nội dung mặc định trong file <code>Code.gs</code> (thường chỉ có hàm <code>myFunction()</code> rỗng).</li>
        <li>Bấm nút <strong>📋 Copy code Apps Script</strong> phía trên → dán vào <code>Code.gs</code>.</li>
        <li>Bấm <strong>💾 Save</strong> (Ctrl/Cmd + S).</li>
      </ol>
      <details class="code-toggle">
        <summary>Xem trước code Apps Script (~50 dòng)</summary>
        <pre class="code-block" id="scriptPreview">Đang tải...</pre>
      </details>
    </div>
  </section>

  <section class="card guide-step">
    <div class="card-header"><h2><span class="step-num">3</span> Deploy thành Web App</h2></div>
    <div class="card-body">
      <ol class="guide-list">
        <li>Góc trên phải Apps Script editor → bấm nút <strong>Deploy</strong> → <strong>New deployment</strong>.</li>
        <li>Bấm biểu tượng ⚙️ bên cạnh "Select type" → chọn <strong>Web app</strong>.</li>
        <li>Điền cấu hình:
          <table class="config-table">
            <tr><td>Description</td><td><code>v1</code></td></tr>
            <tr><td>Execute as</td><td><strong>Me (your-email@futaland.vn)</strong> — email gửi đi sẽ từ tài khoản này</td></tr>
            <tr><td>Who has access</td><td><strong>Anyone</strong> — yêu cầu để app gọi được; xem <a href="#sec-security">bảo mật</a> bên dưới</td></tr>
          </table>
        </li>
        <li>Bấm <strong>Deploy</strong>.</li>
        <li>Lần đầu Google sẽ hỏi cấp quyền:
          <ul class="guide-sublist">
            <li>Chọn tài khoản của bạn.</li>
            <li>Màn hình "Google hasn't verified this app" → <strong>Advanced</strong> → <strong>Go to FUTA Email Sender (unsafe)</strong> <em>(an toàn vì đây là code của chính bạn, không phải bên thứ 3)</em>.</li>
            <li>Bấm <strong>Allow</strong> để cho phép gửi email.</li>
          </ul>
        </li>
        <li>Hiện popup "Deployment successfully updated" → <strong>copy "Web app URL"</strong> dạng:
          <pre class="code-block">https://script.google.com/macros/s/AKfy.../exec</pre>
        </li>
      </ol>
    </div>
  </section>

  <section class="card guide-step">
    <div class="card-header"><h2><span class="step-num">4</span> Dán URL vào app</h2></div>
    <div class="card-body">
      <ol class="guide-list">
        <li>Vào <a href="#/settings">Cài đặt</a> trong app này.</li>
        <li>Dán URL vừa copy vào ô <strong>Apps Script Web App URL</strong>.</li>
        <li>Điền <strong>Tên hiển thị người gửi</strong> (vd: <em>Phạm Hồng Duy - FUTA Land</em>).</li>
        <li>Điền <strong>Email gửi thử</strong> (email của bạn) để test trước khi gửi đồng loạt.</li>
        <li>Bấm <strong>💾 Lưu</strong> → <strong>🔌 Test kết nối</strong>.</li>
        <li>Nếu thấy <span class="conn-ok-inline">✓ Kết nối OK</span> là xong.</li>
      </ol>
      <div class="callout callout-success">
        🎉 Setup hoàn tất! Bây giờ vào tab <a href="#/recipients">Người nhận</a> để import danh sách, rồi <a href="#/">Soạn & Gửi</a>.
      </div>
    </div>
  </section>

  <section class="card guide-step" id="sec-security">
    <div class="card-header"><h2>🔐 Bảo mật</h2></div>
    <div class="card-body">
      <div class="callout callout-warn">
        <strong>Cảnh báo:</strong> URL Apps Script deploy với "Anyone" → ai có URL đều gọi được và gửi email <strong>dưới danh nghĩa tài khoản của bạn</strong>.
        <br><strong>Không chia sẻ URL Apps Script công khai.</strong> Coi nó như mật khẩu.
      </div>
      <p>Để tăng bảo mật bằng shared secret, mở <code>apps-script.gs</code> trên script.google.com → sửa dòng <code>const SHARED_SECRET = '';</code> thành chuỗi ngẫu nhiên → deploy lại (Manage deployments → ✏ edit → Version: New version → Deploy).</p>
    </div>
  </section>

  <section class="card guide-step">
    <div class="card-header"><h2>📊 Giới hạn & Khuyến nghị</h2></div>
    <div class="card-body">
      <table class="config-table">
        <thead><tr><th>Mục</th><th>Workspace (@futaland.vn)</th><th>Gmail cá nhân</th></tr></thead>
        <tbody>
          <tr><td>Email/ngày</td><td>~1.500</td><td>~100</td></tr>
          <tr><td>Người nhận / email</td><td>100</td><td>100</td></tr>
          <tr><td>Throttle khuyến nghị</td><td>500-1000ms</td><td>1000-2000ms</td></tr>
        </tbody>
      </table>
      <ul class="guide-list" style="margin-top:1rem">
        <li>App mặc định throttle <strong>500ms</strong> giữa các email — an toàn cho Workspace.</li>
        <li>Không spam khách hàng lạnh (không opt-in) — domain có thể bị Gmail đánh dấu spam.</li>
        <li>Theo dõi <code>quotaRemaining</code> trong response để tránh vượt quota.</li>
      </ul>
    </div>
  </section>

  <section class="card guide-step">
    <div class="card-header"><h2>🛠 Khắc phục sự cố</h2></div>
    <div class="card-body">
      <table class="config-table">
        <thead><tr><th>Triệu chứng</th><th>Cách xử lý</th></tr></thead>
        <tbody>
          <tr><td><strong>CORS error</strong></td><td>Script chưa deploy "Anyone" — kiểm tra <em>Who has access</em> trong Manage deployments.</td></tr>
          <tr><td><strong>403 / Authorization required</strong></td><td>Chưa Authorize. Mở script trên script.google.com → chạy thử hàm <code>doGet</code> → Google sẽ hỏi cấp quyền.</td></tr>
          <tr><td><strong>"Service invoked too many times"</strong></td><td>Vượt quota. Đợi 24h hoặc dùng tài khoản khác.</td></tr>
          <tr><td><strong>Email vào spam khách hàng</strong></td><td>Giảm link/CTA, viết tự nhiên, thêm chữ ký, kiểm tra SPF/DKIM của domain.</td></tr>
          <tr><td><strong>"Failed to fetch" khi test</strong></td><td>URL sai hoặc thiếu <code>/exec</code> cuối. Copy lại từ Manage deployments → bản deploy mới nhất.</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</template>

<!-- Add recipient modal -->
<div id="manualModal" class="modal-overlay" hidden>
  <div class="modal">
    <div class="modal-header">
      <h3>Thêm người nhận thủ công</h3>
      <button class="modal-close" data-close>✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">Email *</label>
      <input type="email" id="manualEmail" class="input" required>
      <label class="field-label">Tên</label>
      <input type="text" id="manualName" class="input">
      <label class="field-label">Dự án quan tâm</label>
      <input type="text" id="manualProject" class="input">
      <label class="field-label">SĐT</label>
      <input type="text" id="manualPhone" class="input">
      <label class="field-label">Trường tùy chỉnh (JSON, để trống nếu không dùng)</label>
      <textarea id="manualCustom" class="textarea" rows="3" placeholder='{"ngay_hen":"15/06","gia_uu_dai":"2.1 tỷ"}'></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close>Hủy</button>
      <button class="btn btn-primary" id="manualSaveBtn">Thêm</button>
    </div>
  </div>
</div>

<!-- Send progress modal -->
<div id="sendModal" class="modal-overlay" hidden>
  <div class="modal">
    <div class="modal-header">
      <h3>Đang gửi email</h3>
    </div>
    <div class="modal-body">
      <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
      <p id="progressText" class="progress-text">0 / 0</p>
      <div class="send-log" id="sendLog"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelSendBtn">Dừng</button>
      <button class="btn btn-primary" id="closeSendBtn" hidden>Đóng</button>
    </div>
  </div>
</div>
